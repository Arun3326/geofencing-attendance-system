<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <title>Geofence Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Bootstrap CSS for toast -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #map {
            height: 400px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .centered-container {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>
<div class="centered-container">
    <h4 class="text-center mb-4">Mark Attendance</h4>
    <div id="map"></div>
    <form id="attendanceForm">
        <input type="hidden" name="latitude" id="latitude">
        <input type="hidden" name="longitude" id="longitude">
        <button type="submit" class="btn btn-success w-100">Submit Attendance</button>
    </form>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container"></div>

<script>
    const officeLat = 11.100998;
    const officeLng = 76.968579;
    const officeRadius = 500;

    // Initialize Map
    const map = L.map('map').setView([officeLat, officeLng], 16);

    // Add OpenStreetMap Layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
    }).addTo(map);

    // Draw geofence circle
    const geofenceCircle = L.circle([officeLat, officeLng], {
        radius: officeRadius,
        color: 'blue',
        fillColor: '#add8e6',
        fillOpacity: 0.4
    }).addTo(map);

    // Get user location
    navigator.geolocation.getCurrentPosition(position => {
        const { latitude, longitude } = position.coords;
        document.getElementById('latitude').value = latitude;
        document.getElementById('longitude').value = longitude;
        const marker = L.marker([latitude, longitude]).addTo(map)
            .bindPopup("Your location").openPopup();
        map.setView([latitude, longitude]);
    }, () => {
        showToast("❌ Failed to get location.", "danger");
    });

    // Submit attendance
    document.getElementById('attendanceForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const formData = new FormData(this);

        fetch("/mark_attendance", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.redirect) {
                showToast(data.message || "Success", "success");
                setTimeout(() => window.location.href = data.redirect, 1500);
            } else {
                showToast(data.message || "Something went wrong", "warning");
            }
        })
        .catch(() => {
            showToast("Error submitting attendance", "danger");
        });
    });

    // Toast display function
    function showToast(message, type = "info") {
        const toast = document.createElement('div');
        toast.className = `toast align-items-center text-bg-${type} border-0 show`;
        toast.role = 'alert';
        toast.innerHTML = `
            <div class="d-flex">
                <div class="toast-body">${message}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>`;
        document.getElementById('toast-container').appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
